server:
  port: 8080

spring:
  application:
    name: ai-chatbot
  autoconfigure:
    exclude: []
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7