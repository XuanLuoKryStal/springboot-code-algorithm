server:
  port: 8080

spring:
  application:
    name: springboot-code-algorithm
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true

mybatis:
  type-aliases-package: com.example.codealgorithm.entity
  mapper-locations: classpath:mapper/*.xml